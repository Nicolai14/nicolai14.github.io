<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolai Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="video-container">
        <video id="bgVideo" muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content-overlay blurred" id="mainOverlay">

        <div class="enter-text" id="enterTxt">CLICK TO ENTER</div>

        <div class="glass-panel" id="interactionPanel">
            <div class="discord-profile">
                <div class="avatar-container">
                    <img id="discordAvatar" src="github_profile_optimized.jpg" alt="Nicolai">
                    <span class="status-dot online"></span>
                </div>
                <div class="discord-info">
                    <div class="discord-name">Nicolai</div>
                </div>
                <div class="profile-content">
                    <div class="social-icons">
                        <a href="https://github.com/Nicolai14" target="_blank" rel="noopener" class="icon-btn github" aria-label="GitHub">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
